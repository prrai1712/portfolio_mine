# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo: Dashboard → Blueprints → New Blueprint Instance → portfolio_mine

services:
  - type: web
    name: priyanshuos
    runtime: static
    repo: https://github.com/prrai1712/portfolio_mine
    branch: main
    buildCommand: cd client && npm ci && npm run build
    staticPublishPath: ./client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

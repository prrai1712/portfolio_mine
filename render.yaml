# Render Blueprint — https://render.com/docs/blueprint-spec
# Redeploy: Dashboard → priyanshuos → Manual Deploy → Clear build cache

services:
  - type: web
    name: priyanshuos
    runtime: node
    repo: https://github.com/prrai1712/portfolio_mine
    branch: main
    plan: free
    buildCommand: ./scripts/render-build.sh
    startCommand: cd client && npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
